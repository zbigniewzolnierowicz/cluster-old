---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-transcode-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Ti
  volumeName: nfs-transcode-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-transcode-pv
  namespace: media
spec:
  capacity:
    storage: 4Ti
  nfs:
    server: "${TRUENAS_ADDR}"
    path: "/mnt/eldorado/Base/Media/Transcode"
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain