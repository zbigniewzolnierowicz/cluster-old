apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: redis
  namespace: security
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://charts.bitnami.com/bitnami
      chart: redis
      version: 16.9.7
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: bitnami/redis
      tag: 6.2.7
    architecture: standalone
    auth:
      enabled: true
      password: ${SECRET_AUTHELIA_REDIS_PASSWORD}
    master:
      resources:
        requests:
          memory: 64Mi
      persistence:
        enabled: false
