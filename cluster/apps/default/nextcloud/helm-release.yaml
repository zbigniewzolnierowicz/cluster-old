---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://nextcloud.github.io/helm/
      chart: nextcloud
      version: 3.0.1
      sourceRef:
        kind: HelmRepository
        name: nextcloud-charts
        namespace: flux-system
  values:
    image:
      repository: nextcloud
      tag: 23.0.6-apache
      pullPolicy: IfNotPresent
    ingress:
      enabled: true
      className: "traefik"
      path: /
      pathType: Prefix
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-production"
        hajimari.io/enable: "true"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        # traefik.ingress.kubernetes.io/router.middlewares: "nextcloud-traefik-middleware@kubernetescrd"
      hosts:
        - host: "cloud.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - "cloud.${SECRET_DOMAIN}"
          secretName: "nextcloud-tls"
    nextcloud:
      host: "cloud.${SECRET_DOMAIN}"
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: username
        passwordKey: password
        tokenKey: serverinfo_token
        smtpUsernameKey: smtp_username
        smtpPasswordKey: smtp_password
      update: 0
      mail:
        enabled: true
        fromAddress: nextcloud
        domain: ${SECRET_DOMAIN}
        smtp:
          host: ${SECRET_SMTP}
          secure: ssl
          port: 465
          authtype: LOGIN
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => 
            array(
              0 => '${METALLB_TRAEFIK_ADDR}',
            ),
            'forwarded_for_headers' => 
            array (
              0 => 'HTTP_X_FORWARDED_FOR',
            ),
          );
        gitops.config.php: |-
          <?php
          $CONFIG = array (
            'appstoreenabled' => true,
            #'appstoreurl' => 'https://apps.nextcloud.com/api/v0',
            'mail_domain' => '${SECRET_DOMAIN}',
          );
    persistence:
      enabled: true
      storageClass: "nfs-client"
      accessMode: ReadWriteOnce
      size: 8Gi
      nextcloudData:
        enabled: true
        existingClaim: nfs-nextcloud-pvc
    metrics:
      enabled: true
      timeout: 5s
      image:
        repository: xperimental/nextcloud-exporter
        tag: 0.5.1
        pullPolicy: IfNotPresent
    redis:
      enabled: true
      password: ${SECRET_NEXTCLOUD_REDIS_PASSWORD}
      master:
        persistence:
          enabled: false
      replica:
        persistence:
          enabled: false
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: nextcloud-db-postgresql
      existingSecret:
        enabled: true
        secretName: nextcloud-db-secret
        usernameKey: username
        passwordKey: password
        databaseKey: database
    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
