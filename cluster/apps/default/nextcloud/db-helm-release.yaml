apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nextcloud-db
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://charts.bitnami.com/bitnami
      chart: postgresql
      version: 11.6.12
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: 14.2.0-debian-10-r13
      pullPolicy: IfNotPresent
    auth:
      username: ${SECRET_NEXTCLOUD_POSTGRES_USER}
      database: ${SECRET_NEXTCLOUD_POSTGRES_DATABASE}
      existingSecret: nextcloud-db-secret
      secretKeys:
        adminPasswordKey: "postgres-password"
        userPasswordKey: "password"
    persistence:
      enabled: true
      existingClaim: nextcloud-db-data
