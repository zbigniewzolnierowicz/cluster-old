apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zed-homepage
  namespace: default
  labels:
    app.kubernetes.io/name: zed-homepage
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  ingressClassName: traefik
  rules:
    - host: notdead.cafe
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zed-homepage
                port:
                  number: 80
  tls:
    - hosts:
        - notdead.cafe
      secretName: zed-homepage-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: zed-homepage
  name: zed-homepage-tls
  namespace: default
spec:
  dnsNames:
    - notdead.cafe
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production
  secretName: zed-homepage-tls
