---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: deluge
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: deluge
      version: '4.3.0'
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: linuxserver/deluge
      tag: version-2.0.3-2201906121747ubuntu18.04.1
    env:
      TZ: Europe/Warsaw
    persistence:
      config:
        enabled: true
        existingClaim: "deluge-config"
      downloads:
        enabled: true
        existingClaim: "nfs-downloads-pvc"
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          hajimari.io/enable: "true"
          hajimari.io/icon: "multicast"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        hosts:
          - host: "torrent.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "torrent.${SECRET_DOMAIN}"
            secretName: "deluge-tls"
    resources:
      requests:
        memory: 100Mi
        cpu: 250m
      limits:
        memory: 250Mi
