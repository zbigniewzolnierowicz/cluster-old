apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tdarr
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: tdarr
      version: '4.3.0'
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: "ghcr.io/haveagitgat/tdarr"
      tag: "2.00.16.3"
    node:
      enabled: true
      id: "node"
      image:
        repository: "ghcr.io/haveagitgat/tdarr_node"
        tag: "2.00.16.1"
    podSecurityContext:
      supplementalGroups:
      - 1000
      - 1002
    env:
      TZ: Europe/Warsaw
    persistence:
      config:
        enabled: true
        type: "pvc"
        existingClaim: "tdarr-config"
      media:
        enabled: true
        type: "pvc"
        existingClaim: "nfs-media-pvc"
      data:
        enabled: true
        type: "pvc"
        existingClaim: "tdarr-database"
    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          hajimari.io/enable: "true"
          hajimari.io/icon: "television-classic"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        hosts:
          - host: "tdarr.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "tdarr.${SECRET_DOMAIN}"
            secretName: "tdarr-tls"
