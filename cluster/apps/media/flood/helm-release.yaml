apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: flood
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: rtorrent-flood
      version: '8.2.0'
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: "jesec/rtorrent-flood"
      tag: "latest@sha256:f0c894ec459e52d85bc69685247ddbd8e8fcf3709b50bf8ee8b0df3bf69b7b49"
    env:
      TZ: Europe/Warsaw
    podSecurityContext:
      supplementalGroups:
      - 1000
      - 1002
    persistence:
      config:
        enabled: true
        type: "pvc"
        existingClaim: "flood-config"
      downloads:
        enabled: true
        type: "pvc"
        existingClaim: "nfs-downloads-pvc"
    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          hajimari.io/enable: "true"
          hajimari.io/icon: "download"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        hosts:
          - host: "torrent.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "torrent.${SECRET_DOMAIN}"
            secretName: "flood-tls"
